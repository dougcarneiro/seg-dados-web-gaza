{% extends "refugees/base.html" %}
{% block content %}
  <div class="mx-auto max-w-lg rounded-lg border border-gray-200 bg-white p-8 shadow-sm">
    <h1 class="text-xl font-semibold text-gray-900">Cadastro de refugiados brasileiros</h1>
    <p class="mt-3 text-sm leading-relaxed text-gray-600">
      Aplicação para registro e manutenção dos seus dados. O acesso é feito com e-mail e senha forte.
    </p>
    <div class="mt-6 flex flex-wrap gap-3">
      {% if user.is_authenticated %}
        <a href="{% url 'refugees:profile' %}" class="rounded bg-accent px-4 py-2 text-sm text-white hover:bg-accent-hover">Abrir meu cadastro</a>
      {% else %}
        <a href="{% url 'refugees:signup' %}" class="rounded bg-accent px-4 py-2 text-sm text-white hover:bg-accent-hover">Criar conta</a>
        <a href="{% url 'refugees:login' %}" class="rounded border border-gray-300 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Entrar</a>
      {% endif %}
    </div>
  </div>
{% endblock %}
