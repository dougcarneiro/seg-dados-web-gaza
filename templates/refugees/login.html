{% extends "refugees/base.html" %}
{% load static %}
{% block title %}Entrar — Refugiados{% endblock %}
{% block content %}
  <div class="mx-auto max-w-md rounded-lg border border-gray-200 bg-white p-8 shadow-sm">
    <h1 class="text-xl font-semibold">Entrar</h1>
    <form method="post" class="mt-6" data-submit-pending>
      {% csrf_token %}
      {% include "refugees/_form_fields.html" with form=form %}
      <button
        type="submit"
        class="w-full rounded bg-accent py-2.5 text-sm font-medium text-white hover:bg-accent-hover disabled:cursor-not-allowed disabled:opacity-60"
        data-pending-label="Enviando…"
      >
        Continuar
      </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-600">
      <a href="{% url 'refugees:signup' %}" class="text-accent hover:underline">Criar conta</a>
    </p>
  </div>
{% endblock %}
{% block extra_js %}
<script src="{% static 'web/js/form-submit-pending.js' %}" defer></script>
{% endblock %}
