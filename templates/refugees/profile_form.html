{% extends "refugees/base.html" %}
{% block title %}Editar cadastro{% endblock %}
{% block content %}
  <div class="mx-auto max-w-lg rounded-lg border border-gray-200 bg-white p-8 shadow-sm">
    <h1 class="text-xl font-semibold">Editar cadastro</h1>
    <form method="post" class="mt-6">
      {% csrf_token %}
      {% include "refugees/_form_fields.html" with form=form %}
      <button type="submit" class="w-full rounded bg-accent py-2.5 text-sm font-medium text-white hover:bg-accent-hover">Salvar</button>
    </form>
    <p class="mt-4 text-center text-sm">
      <a href="{% url 'refugees:profile' %}" class="text-gray-600 hover:text-accent">Cancelar</a>
    </p>
  </div>
{% endblock %}
