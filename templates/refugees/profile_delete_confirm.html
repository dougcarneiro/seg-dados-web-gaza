{% extends "refugees/base.html" %}
{% block title %}Excluir conta{% endblock %}
{% block content %}
  <div class="mx-auto max-w-md rounded-lg border border-red-100 bg-white p-8 shadow-sm">
    <h1 class="text-xl font-semibold text-red-900">Excluir conta</h1>
    <p class="mt-3 text-sm text-gray-600">
      Esta ação remove permanentemente o usuário <strong>{{ user.email }}</strong> e o cadastro de <strong>{{ refugee.name }}</strong>.
    </p>
    <form method="post" action="{% url 'refugees:profile_delete' %}" class="mt-6">
      {% csrf_token %}
      <button type="submit" class="w-full rounded bg-red-700 py-2.5 text-sm font-medium text-white hover:bg-red-800">Excluir definitivamente</button>
    </form>
    <p class="mt-4 text-center text-sm">
      <a href="{% url 'refugees:profile' %}" class="text-gray-600 hover:text-accent">Cancelar</a>
    </p>
  </div>
{% endblock %}
